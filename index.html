  <script>
    // Simple typing animation
    const el = document.getElementById("typing");
    const phrases = ["best", "safest", "cleanest"];
    let pi = 0, i = 0, deleting = false;

    function tick() {
      const word = phrases[pi];
      if (!deleting) {
        i++;
        el.textContent = word.slice(0, i);
        if (i === word.length) {
          deleting = true;
          setTimeout(tick, 900);
          return;
        }
      } else {
        i--;
        el.textContent = word.slice(0, i);
        if (i === 0) {
          deleting = false;
          pi = (pi + 1) % phrases.length;
        }
      }
      setTimeout(tick, deleting ? 45 : 70);
    }
    tick();
  </script>
